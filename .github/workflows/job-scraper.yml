name: Job Radar Automated Scanner

on:
  schedule:
    # Runs at 7:00 AM (11:00 UTC) and 3:00 PM (19:00 UTC) every day
    - cron: '0 11,19 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  scan-jobs:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to commit the jobs.json file back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Job Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/runScanner.ts
        
      - name: Commit and Push Updated Jobs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/jobs.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update: Scanned fresh jobs"
          git push
