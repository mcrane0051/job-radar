name: Automated Job Scraper

on:
  schedule:
    - cron: '17 11,19 * * *' # Runs at 7:17 AM and 3:17 PM EST (11:17 and 19:17 UTC)
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  scan-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Job Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/runScanner.ts

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add public/jobs.json
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated job scan [skip ci]"
          git push
